<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Agentic AI platform architecture</title><desc id="desc">Input channels connect to a FastAPI core engine, multi-agent runtime, MCP business tools, data infrastructure, training harness, observability, and business actions.</desc>
