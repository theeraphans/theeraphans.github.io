<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Visual product recognition pipeline</title>
  <desc id="desc">Five stages connect shelf image input to object detection, product classification, similarity search, and shelf analytics.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#1d5b48"/></marker>
    <style>.h{font-family:Arial,sans-serif;font-size:34px;font-weight:700;fill:#081a16}.k{font-family:Arial,sans-serif;font-size:13px;font-weight:700;fill:#1d5b48;letter-spacing:2px}.t{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#12211d}.p{font-family:Arial,sans-serif;font-size:14px;font-weight:400;fill:#66716d}.n{font-family:Arial,sans-serif;font-size:15px;font-weight:700;fill:#081a16}.cap{font-family:Arial,sans-serif;font-size:14px;font-weight:700;fill:#12211d}.small{font-family:Arial,sans-serif;font-size:12px;font-weight:400;fill:#66716d}</style>
  </defs>
  <rect width="1200" height="620" rx="22" fill="#fbfaf6"/>
  <text x="45" y="55" class="k">COMPUTER VISION · PRODUCTION FLOW</text>
  <text x="45" y="98" class="h">Visual product recognition</text>
  <path d="M225 300H260M460 300H495M695 300H730M930 300H965" stroke="#1d5b48" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(35 130)"><rect width="190" height="330" rx="18" fill="#fff" stroke="#cbd7d2"/><circle cx="28" cy="28" r="18" fill="#c8f169"/><text x="28" y="34" text-anchor="middle" class="n">1</text><rect x="24" y="78" width="142" height="98" rx="8" fill="#e9f0ed"/><path d="M36 156h118M44 88v60M76 88v60M108 88v60M140 88v60" stroke="#1d5b48" stroke-width="5"/><text x="95" y="215" text-anchor="middle" class="t">Image input</text><text x="95" y="245" text-anchor="middle" class="p">Capture or upload</text><text x="95" y="266" text-anchor="middle" class="p">shelf imagery</text></g>
  <g transform="translate(270 130)"><rect width="190" height="330" rx="18" fill="#fff" stroke="#cbd7d2"/><circle cx="28" cy="28" r="18" fill="#c8f169"/><text x="28" y="34" text-anchor="middle" class="n">2</text><rect x="32" y="72" width="126" height="112" rx="8" fill="#e9f0ed"/><g fill="none" stroke="#1d5b48" stroke-width="3"><rect x="43" y="86" width="43" height="34"/><rect x="91" y="83" width="53" height="39"/><rect x="50" y="128" width="56" height="42"/><rect x="111" y="127" width="34" height="43"/></g><text x="95" y="215" text-anchor="middle" class="t">Object detection</text><text x="95" y="245" text-anchor="middle" class="p">Locate every product</text><text x="95" y="266" text-anchor="middle" class="p">on the shelf</text></g>
  <g transform="translate(505 130)"><rect width="190" height="330" rx="18" fill="#fff" stroke="#cbd7d2"/><circle cx="28" cy="28" r="18" fill="#c8f169"/><text x="28" y="34" text-anchor="middle" class="n">3</text><g transform="translate(30 76)"><rect width="130" height="26" rx="6" fill="#e9f0ed"/><rect y="34" width="130" height="26" rx="6" fill="#e9f0ed"/><rect y="68" width="130" height="26" rx="6" fill="#e9f0ed"/><circle cx="15" cy="13" r="6" fill="#1d5b48"/><circle cx="15" cy="47" r="6" fill="#1d5b48"/><circle cx="15" cy="81" r="6" fill="#1d5b48"/><path d="M32 13h75M32 47h65M32 81h82" stroke="#8da39a" stroke-width="5"/></g><text x="95" y="207" text-anchor="middle" class="t">Product</text><text x="95" y="229" text-anchor="middle" class="t">classification</text><text x="95" y="267" text-anchor="middle" class="p">Map detections to</text><text x="95" y="288" text-anchor="middle" class="p">SKU classes</text></g>
  <g transform="translate(740 130)"><rect width="190" height="330" rx="18" fill="#fff" stroke="#cbd7d2"/><circle cx="28" cy="28" r="18" fill="#c8f169"/><text x="28" y="34" text-anchor="middle" class="n">4</text><g transform="translate(28 73)"><ellipse cx="44" cy="25" rx="34" ry="13" fill="#1d5b48"/><path d="M10 25v58c0 7 15 13 34 13s34-6 34-13V25M10 53c0 7 15 13 34 13s34-6 34-13" fill="none" stroke="#1d5b48" stroke-width="5"/><path d="M85 28h49M85 58h49M85 88h49" stroke="#8da39a" stroke-width="4"/><circle cx="129" cy="28" r="7" fill="#c8f169"/><circle cx="118" cy="58" r="7" fill="#c8f169"/><circle cx="132" cy="88" r="7" fill="#c8f169"/></g><text x="95" y="215" text-anchor="middle" class="t">Similarity search</text><text x="95" y="245" text-anchor="middle" class="p">Match against the</text><text x="95" y="266" text-anchor="middle" class="p">reference catalog</text></g>
  <g transform="translate(975 130)"><rect width="190" height="330" rx="18" fill="#081a16"/><circle cx="28" cy="28" r="18" fill="#c8f169"/><text x="28" y="34" text-anchor="middle" class="n">5</text><g transform="translate(28 72)"><rect width="134" height="112" rx="8" fill="#123a30"/><path d="M17 89V61M43 89V42M69 89V69M95 89V31" stroke="#c8f169" stroke-width="10"/><path d="M18 25h96" stroke="#fff" stroke-opacity=".5" stroke-width="5"/></g><text x="95" y="215" text-anchor="middle" class="t" fill="#fff" style="fill:#fff">Shelf analytics</text><text x="95" y="245" text-anchor="middle" class="p" fill="#fff" style="fill:#b9c8c3">Availability, placement,</text><text x="95" y="266" text-anchor="middle" class="p" fill="#fff" style="fill:#b9c8c3">and performance</text></g>
  <g transform="translate(35 495)"><rect width="1130" height="86" rx="14" fill="#eef2ef"/><g transform="translate(25 22)"><circle cx="20" cy="20" r="20" fill="#c8f169"/><text x="52" y="18" class="cap">Automated</text><text x="52" y="38" class="small">end-to-end workflow</text></g><g transform="translate(290 22)"><circle cx="20" cy="20" r="20" fill="#c8f169"/><text x="52" y="18" class="cap">Accurate</text><text x="52" y="38" class="small">90% across 750+ SKUs</text></g><g transform="translate(565 22)"><circle cx="20" cy="20" r="20" fill="#c8f169"/><text x="52" y="18" class="cap">Actionable</text><text x="52" y="38" class="small">shelf-level intelligence</text></g><g transform="translate(850 22)"><circle cx="20" cy="20" r="20" fill="#c8f169"/><text x="52" y="18" class="cap">Scalable</text><text x="52" y="38" class="small">enterprise retail operations</text></g></g>
</svg>
