<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise data platform architecture</title><desc id="desc">Enterprise sources feed Airflow pipelines, dbt transformations, a centralized data warehouse, and Power BI and AI applications.</desc>
